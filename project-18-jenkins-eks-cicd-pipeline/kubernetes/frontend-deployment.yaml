apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
      - name: frontend
       # image: 225989367272.dkr.ecr.ap-south-1.amazonaws.com/project-18-frontend:v1 -- harcoded
        image: 225989367272.dkr.ecr.ap-south-1.amazonaws.com/project-18-frontend:latest

        ports:
        - containerPort: 80